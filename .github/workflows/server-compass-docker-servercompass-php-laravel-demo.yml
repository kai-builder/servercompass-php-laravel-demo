name: Docker Deploy - servercompass-php-laravel-demo

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_only:
        description: 'Skip build job and run deploy only (use latest GHCR image)'
        required: false
        default: 'false'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.deploy_only != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.servercompass
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  deploy:
    needs: build
    if: ${{ always() && (needs.build.result == 'success' || needs.build.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST_SERVERCOMPASS_PHP_LARAVEL_DEMO }}
          username: ${{ secrets.VPS_USER_SERVERCOMPASS_PHP_LARAVEL_DEMO }}
          key: ${{ secrets.VPS_SSH_KEY_SERVERCOMPASS_PHP_LARAVEL_DEMO }}
          port: ${{ secrets.VPS_PORT_SERVERCOMPASS_PHP_LARAVEL_DEMO }}
          script: |
            set -e
            echo "🚀 Starting Docker deployment for servercompass-php-laravel-demo..."

            # Ensure Docker is available and restart if using systemd
            echo "🐳 Checking Docker installation..."
            if command -v docker &> /dev/null; then
              echo "✅ Docker is installed"

              # Restart Docker daemon only if it's managed by systemd
              if systemctl is-active --quiet docker 2>/dev/null; then
                echo "🔄 Restarting Docker daemon to ensure iptables chains are initialized..."
                sudo systemctl restart docker
                sleep 3
              elif systemctl is-enabled --quiet docker 2>/dev/null; then
                echo "🔄 Starting Docker daemon..."
                sudo systemctl start docker
                sleep 3
              else
                echo "ℹ️  Docker is not managed by systemd, skipping restart"
              fi

              # Verify Docker is running
              if ! docker info &> /dev/null; then
                echo "❌ Docker is not running. Please install and start Docker on this server."
                exit 1
              fi

              # Clean up orphaned networks that might cause iptables conflicts
              echo "🧹 Cleaning up orphaned Docker networks..."
              docker network prune -f || true
            else
              echo "⚠️  Docker is not installed. Installing Docker automatically..."

              # Install Docker using official installation script
              echo "📦 Downloading Docker installation script..."
              curl -fsSL https://get.docker.com -o /tmp/get-docker.sh

              echo "🔧 Installing Docker..."
              sudo sh /tmp/get-docker.sh

              # Clean up installation script
              rm -f /tmp/get-docker.sh

              # Start Docker service
              echo "🚀 Starting Docker service..."
              sudo systemctl start docker
              sudo systemctl enable docker

              # Wait for Docker to start
              sleep 5

              # Verify installation
              if command -v docker &> /dev/null && docker info &> /dev/null; then
                echo "✅ Docker installed and running successfully"

                # Display installed version
                docker --version
                docker compose version
              else
                echo "❌ Docker installation failed. Please check the logs above."
                exit 1
              fi
            fi

            # Navigate to app directory and ensure it exists
            mkdir -p /root/server-compass/apps/servercompass-php-laravel-demo
            cd /root/server-compass/apps/servercompass-php-laravel-demo

            # Always create/overwrite docker-compose.yml to ensure it uses the image from GHCR
            echo "📝 Creating docker-compose.yml..."
            printf '%s\n' \
              'services:' \
              '  servercompass-php-laravel-demo:' \
              '    image: ghcr.io/${{ github.repository }}:latest' \
              '    container_name: servercompass-php-laravel-demo-app' \
              '    ports:' \
              '      - "3000:3000"' \
              '    environment:' \
              '      PORT: "${PORT:-3000}"' \
              '    env_file:' \
              '      - .env' \
              '    restart: unless-stopped' \
              > docker-compose.yml

            # Create .env (prefer Server Compass-managed secret; fallback to existing server file)
            if [ -n "${{ secrets.ENV_FILE_SERVERCOMPASS_PHP_LARAVEL_DEMO }}" ]; then
              echo "🧩 Writing .env from GitHub secret (ENV_FILE_SERVERCOMPASS_PHP_LARAVEL_DEMO)..."
              cat > .env << 'SERVER_COMPASS_ENV_FILE'
              ${{ secrets.ENV_FILE_SERVERCOMPASS_PHP_LARAVEL_DEMO }}
              SERVER_COMPASS_ENV_FILE
            elif [ -f .env ]; then
              echo "🧩 No env secret found. Keeping existing .env from server."
            else
              echo "🧩 No env secret found and .env is missing. Creating empty .env..."
              touch .env
            fi

            # Lightweight sanity check (count only; never print values)
            ENV_VAR_COUNT=$(grep -Ec '^[A-Za-z_][A-Za-z0-9_]*=' .env 2>/dev/null || true)
            echo "🧩 .env variables loaded: ${ENV_VAR_COUNT}"

            # Log in to GHCR
            echo "🔐 Logging in to GitHub Container Registry..."
            echo ${{ secrets.GHCR_TOKEN_SERVERCOMPASS_PHP_LARAVEL_DEMO }} | docker login ghcr.io -u ${{ secrets.GHCR_USER_SERVERCOMPASS_PHP_LARAVEL_DEMO }} --password-stdin

            # Pull latest images
            echo "📥 Pulling latest Docker images..."
            docker compose pull

            # Stop and remove old containers
            echo "🛑 Stopping old containers..."
            docker compose down

            # Start new containers
            echo "🚀 Starting new containers..."
            docker compose up -d

            # Cleanup old images
            echo "🧹 Cleaning up old images..."
            docker image prune -f

            echo "✅ Deployment completed successfully at $(date)"
            echo "📊 Container Status:"
            docker compose ps

            # Check if any containers are unhealthy/restarting and show logs
            echo ""
            echo "🔍 Checking container health..."
            UNHEALTHY=$(docker compose ps --format json 2>/dev/null | jq -r 'select(.State != "running") | .Name' 2>/dev/null || docker compose ps | grep -E "Restarting|Exited" | awk '{print $1}')
            if [ -n "$UNHEALTHY" ]; then
              echo "⚠️ Warning: Some containers may be unhealthy"
              for container in $UNHEALTHY; do
                echo ""
                echo "📋 Logs for $container:"
                docker logs "$container" --tail 30 2>&1 || true
              done
            else
              echo "✅ All containers are running"
            fi
